user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ─────────────────────────────────────────────────────────────────────────
    # Logging Infrastructure
    # ─────────────────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile           on;
    keepalive_timeout  65;

    # ─────────────────────────────────────────────────────────────────────────
    # Upstream Clusters (Load Balancing)
    # ─────────────────────────────────────────────────────────────────────────
    upstream nexusgate_cluster {
        # Distributed across container replicas defined in docker-compose
        server nexusgate:4500;
        
        # Connection pooling for high-concurrency throughput
        keepalive 32;
    }

    # ─────────────────────────────────────────────────────────────────────────
    # Gateway Endpoint Definition
    # ─────────────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Mandatory Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # Standard API Proxying logic
        location / {
            proxy_pass http://nexusgate_cluster;
            proxy_http_version 1.1;
            
            # Connection Upgrades for potential WebSocket/Streaming support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Identity Preservation
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Industrial-strength timeouts for heavy DB queries and file uploads
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Load Balancer Health Verification
        location /nginx_health {
            access_log off;
            default_type text/plain;
            return 200 "healthy\n";
        }
    }
}
