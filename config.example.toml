# ─────────────────────────────────────────────────────────────────────────────
# NexusGate - Industrial-Grade Unified API Gateway
# Configuration Example
# ─────────────────────────────────────────────────────────────────────────────

# ─── Server Settings ──────────────────────────────────
# Tuning the underlying network and execution bindings.
[server]
host = "0.0.0.0"                 # Bind to all interfaces
port = 4500                      # Public port
workers = 0                      # 0 = auto-detect based on CPU cores (CPUs * 2 + 1)
max_connections = 10000          # Maximum concurrent TCP connections
request_timeout = 30             # Timeout per request in seconds
body_limit = "10mb"              # Maximum request body size (e.g., "10mb", "1gb")
tls_cert = ""                    # Path to TLS certificate (leave blank for HTTP)
tls_key = ""                     # Path to TLS private key
allowed_ips = ["127.0.0.1"]      # IPs exempt from rate limiting
trusted_proxies = ["127.0.0.1"]  # Proxies to trust for X-Forwarded-For headers
cors_origins = ["*"]             # Allowed CORS origins
shutdown_timeout = 30            # Seconds to wait for active requests during shutdown

# ─── Modular Features ─────────────────────────────────
# Toggle major subsystems to minimize RAM and CPU footprint.
[features]
database = true                  # Enable SQL Database Gateway
storage = true                   # Enable Filesystem/Storage Gateway
webhook = true                   # Enable Outbound Webhook Dispatcher
federation = false               # Enable Multi-Node Federation
metrics = true                   # Enable Prometheus/OpenMetrics endpoint
playground = true                # Enable /api/docs Swagger UI
mcp = true                       # Enable Model Context Protocol server

# ─── Model Context Protocol (MCP) ─────────────────────
[mcp]
server_name = "nexusgate"
server_version = "1.0.0"

# ─── Logging ──────────────────────────────────────────
[logging]
level = "INFO"                   # TRACE | DEBUG | INFO | WARNING | ERROR
format = "json"                  # json (production) | pretty (development)
directory = "./logs"             # Where to store log files
file_prefix = "nexusgate"        # Prefix for log filenames
max_file_size = "50mb"           # Max size per log file before rotation
max_files = 5                    # Number of rotated logs to keep
stdout = true                    # Stream logs to console

# ─── Rate Limiting ────────────────────────────────────
# Hardened locks preventing DOS and brute-force attacks.
[rate_limit]
enabled = false                  # Master toggle for rate limiting
backend = "memory"               # memory | redis | sqlite
redis_url = ""                   # Required if backend = "redis" (e.g., "redis://localhost:6379/0")
window = 60                      # Rolling window size in seconds
max_requests = 100               # Max requests allowed per window
burst = 20                       # Extra allowance for short bursts
penalty_threshold = 10           # Consecutive violations before temporary IP ban
penalty_cooldown = 300           # Duration of IP ban in seconds

# ─── Caching ──────────────────────────────────────────
# Mitigation for backend latency via internal response caching.
[cache]
enabled = true
backend = "memory"               # memory | redis | sqlite
redis_url = ""                   # Required if backend = "redis"
max_memory = "100mb"             # Memory limit for internal cache (approximate)
default_ttl = 60                 # Default expiration for generic items (seconds)
query_cache = true               # Cache SQL query metadata/AST
fs_cache = true                  # Cache filesystem directory listings
idempotency_ttl = 86400          # Duration to remember idempotent requests (24h)
response_cache_ttl = 30          # Default Max-Age for cacheable GET responses

# ─── Performance Tuning ───────────────────────────────
# Low-level knobs for internal LRU caches and hot-path logic.
[performance]
query_cache_size = 2048          # Slots for parsed SQL query ASTs
transpiler_cache_size = 4096     # Slots for SQL dialect transpilation results
rate_limit_cache_size = 256      # Slots for rate-limit metadata lookups

# ─── Circuit Breaker ──────────────────────────────────
# Prevents cascading failures by isolating unresponsive backends.
[circuit_breaker]
enabled = true
failure_threshold = 5            # Failures before tripping "OPEN" (rejecting all)
success_threshold = 3            # Successes required in "HALF-OPEN" to recover
timeout = 30                     # Seconds to wait before testing recovery

# ─── API Keys & Access Control ────────────────────────
# Static administrative keys. Dynamic keys are managed via /api/admin.
[api_key.admin]
secret = "CHANGE_THIS_TO_A_SECURE_KEY_AT_LEAST_32_CHARS"
mode = "readwrite"               # readwrite | readonly | writeonly
db_scope = ["*"]                 # ["*"] for all, or ["db1", "db2"]
fs_scope = ["*"]                 # ["*"] for all, or ["vol1", "vol2"]
rate_limit_override = 0          # 0 = use global limit, >0 = specific limit
full_admin = true                # Bypass all scope checks

# ─── Database Backends ────────────────────────────────
# Configure your SQL targets (PostgreSQL, MySQL, SQLite, etc.)
[database.main_db]
engine = "postgres"              # postgres | mysql | sqlite | mariadb | mssql
url = "postgresql://user:pass@localhost:5432/dbname"
mode = "readwrite"               # readwrite | readonly
pool_min = 5                     # Minimum idle connections
pool_max = 20                    # Maximum concurrent connections
connection_timeout = 30          # Seconds to wait for a connection
idle_timeout = 600               # Seconds to keep an idle connection alive
max_lifetime = 3600              # Maximum age of a connection
query_blacklist = ["DROP", "TRUNCATE", "ALTER"]
dangerous_operations = false     # Allow/Disallow raw SQL outside of NexusGate dialect

# ─── Storage Volumes ──────────────────────────────────
# Mount local or network directories as virtual storage aliases.
[storage.uploads]
path = "storage/uploads"         # Physical path on the host machine
mode = "readwrite"               # readwrite | readonly
limit = "10gb"                   # Total capacity limit
chunk_size = "10mb"              # Preferred size for multipart uploads
max_file_size = "800mb"          # Maximum size per individual file
allowed_extensions = []          # Empty = all allowed
blocked_extensions = [".exe", ".bat", ".sh", ".cmd", ".ps1"]

# ─── Webhooks (Optional) ──────────────────────────────
# Trigger external services on database or filesystem changes.
[webhook.log_sink]
url = "https://your-webhook-endpoint.com/receive"
secret = "YOUR_WEBHOOK_SECRET"
rule = "db.any@main_db:*"      # Format: module.operation@alias:target
enabled = true

# ─── Federation (Optional) ────────────────────────────
# Connect multiple NexusGate nodes into a unified cluster.
[federation]
enabled = true
sync_interval = 60             # Seconds between health heartbeats

# [federation.server.edge_node]
url = "https://other-nexusgate-node.com/"
secret = "FEDERATION_SECRET_KEY"
node_id = "local_identity"
trust_mode = "verify"          # verify (strict SSL) | trust (skip cert check)
